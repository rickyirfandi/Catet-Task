name: Build Windows
on:
  push:
    tags:
      - '*'

jobs:
  build-windows:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: x86_64-pc-windows-msvc

      - name: Rust cache
        uses: swatinem/rust-cache@v2
        with:
          workspaces: |
            src-tauri
            catet-cli

      - name: Install frontend dependencies
        run: npm ci

      - name: Test catet-cli
        run: cargo test --manifest-path catet-cli/Cargo.toml --target x86_64-pc-windows-msvc

      - name: Build catet-cli sidecar
        run: |
          cargo build --manifest-path catet-cli/Cargo.toml --release --target x86_64-pc-windows-msvc
          New-Item -ItemType Directory -Path src-tauri\\binaries -Force | Out-Null
          Copy-Item catet-cli\\target\\x86_64-pc-windows-msvc\\release\\catet-cli.exe src-tauri\\binaries\\catet-cli-x86_64-pc-windows-msvc.exe -Force

      - name: Build Tauri app
        uses: tauri-apps/tauri-action@v0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          args: --target x86_64-pc-windows-msvc

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: catet-task-windows-x64
          path: |
            src-tauri/target/x86_64-pc-windows-msvc/release/bundle/msi/*.msi
            src-tauri/target/x86_64-pc-windows-msvc/release/bundle/nsis/*.exe
          if-no-files-found: warn
